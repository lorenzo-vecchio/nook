version: 2
project_name: nook

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    files:
      - LICENSE
      - README.md

brews:
  - repository:
      owner: anomalyco
      name: homebrew-nook
    folder: Formula
    homepage: "https://github.com/anomalyco/nook"
    description: "Workspace organizer CLI for developers"

scoop:
  - repository:
      owner: anomalyco
      name: scoop-nook
    homepage: "https://github.com/anomalyco/nook"
    description: "Workspace organizer CLI for developers"

checksum:
  name_template: "checksums.txt"
